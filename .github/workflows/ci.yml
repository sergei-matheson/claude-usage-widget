name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen and xcbeautify
        run: |
          brew install xcodegen
          brew install xcbeautify

      - name: Run tests
        run: ./test.sh
