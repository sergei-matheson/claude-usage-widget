name: ClaudeUsageWidget

options:
  bundleIdPrefix: HR4LVL7TKY
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: HR4LVL7TKY
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES

targets:

  ClaudeUsageWidgetApp:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    info:
      path: ClaudeUsageWidget/App/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage Widget
        LSMinimumSystemVersion: "26.0"
        # URL scheme lets the widget deep-link into the app (ErrorView "Tap to retry")
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - claudeusagewidget
            CFBundleURLName: io.github.sergei-matheson.claudeusagewidget
    sources:
      - ClaudeUsageWidget/App
      - ClaudeUsageWidget/Shared
    dependencies:
      - target: ClaudeUsageWidgetExtension
        embed: true
        codeSign: true
      - sdk: WidgetKit.framework
    entitlements:
      path: ClaudeUsageWidget/Resources/ClaudeUsageWidgetApp.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.io.github.sergei-matheson.claudeusagewidget
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.github.sergei-matheson.claudeusagewidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.sergei-matheson.claudeusagewidget
        REGISTER_APP_GROUPS: YES

  ClaudeUsageWidgetTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - ClaudeUsageWidgetTests
      - path: ClaudeUsageWidget/Shared
      - path: ClaudeUsageWidget/Widget/Provider
    dependencies:
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.sergei-matheson.claudeusagewidget.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  ClaudeUsageWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    info:
      path: ClaudeUsageWidget/Widget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - ClaudeUsageWidget/Widget
      - ClaudeUsageWidget/Shared
    dependencies:
      - sdk: WidgetKit.framework
    entitlements:
      path: ClaudeUsageWidget/Resources/ClaudeUsageWidgetExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.io.github.sergei-matheson.claudeusagewidget
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.github.sergei-matheson.claudeusagewidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.sergei-matheson.claudeusagewidget.extension
        REGISTER_APP_GROUPS: YES
